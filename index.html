<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indian Fine Dining | Restaurant Name</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,500&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

<style>
:root {
  --gold: #d4af37;
  --white: #ffffff;
  --dark: #121212;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family:'Montserrat', sans-serif;
  color:var(--white);
  background:var(--dark);
}

/* ===== BACKGROUND SLIDESHOW ===== */
.slideshow-container {
  position:fixed;
  width:100%; height:100%;
  z-index:-2;
}

.slide {
  position:absolute;
  width:100%; height:100%;
  background-size:cover;
  background-position:center;
  opacity:0;
  animation:slideAnim 20s infinite;
}

.slide:nth-child(1){background-image:url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?q=80&w=2070');}
.slide:nth-child(2){background-image:url('https://images.unsplash.com/photo-1585937421612-70a0f2955037?q=80&w=1920');animation-delay:5s;}
.slide:nth-child(3){background-image:url('https://images.unsplash.com/photo-1552566626-52f8b828add9?q=80&w=2070');animation-delay:10s;}
.slide:nth-child(4){background-image:url('https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?q=80&w=2070');animation-delay:15s;}

@keyframes slideAnim {
  0%{opacity:0;}
  10%{opacity:1;}
  25%{opacity:1;}
  35%{opacity:0;}
  100%{opacity:0;}
}

.dark-overlay {
  position:fixed;
  width:100%; height:100%;
  background:rgba(0,0,0,0.6);
  z-index:-1;
}

/* ===== NAV ===== */
header {
  position:fixed;
  width:100%;
  padding:20px 0;
  background:linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
  z-index:1000;
}

.nav-content {
  max-width:1200px;
  margin:auto;
  display:flex;
  justify-content:space-between;
  padding:0 20px;
}

.logo {
  font-family:'Cormorant Garamond';
  font-size:1.5rem;
}

.logo span { color:var(--gold); }

nav a {
  margin-left:20px;
  color:white;
  text-decoration:none;
  font-size:0.7rem;
}

/* ===== HERO ===== */
.hero {
  height:80vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

.hero h1 {
  font-size:3rem;
  font-family:'Cormorant Garamond';
}

.divider {
  width:50px;
  height:1px;
  background:var(--gold);
  margin:15px auto;
}

/* ===== MENU ===== */
.content-wrapper {
  background:rgba(18,18,18,0.95);
  padding:60px 0;
}

.section-title h2 {
  text-align:center;
  font-family:'Cormorant Garamond';
  font-size:2rem;
}

.menu-section {
  max-width:800px;
  margin:auto;
  padding:0 20px;
}

.category-label {
  text-align:center;
  color:var(--gold);
  margin:40px 0 10px;
  letter-spacing:3px;
  font-size:0.8rem;
}

.menu-item {
  display:flex;
  justify-content:space-between;
  padding:15px 0;
  border-bottom:1px solid rgba(255,255,255,0.1);
  cursor:pointer;
  transition:0.3s;
}

.menu-item:hover {
  color:var(--gold);
}

.menu-item h3 {
  font-family:'Cormorant Garamond';
}

/* ===== MODAL ===== */
.modal {
  position:fixed;
  width:100%; height:100%;
  background:rgba(0,0,0,0.8);
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  visibility:hidden;
  transition:0.3s;
}

.modal.active {
  opacity:1;
  visibility:visible;
}

.modal-content {
  background:#1a1a1a;
  padding:30px;
  text-align:center;
  width:90%;
  max-width:400px;
}

.modal-content h3 {
  color:var(--gold);
  font-family:'Cormorant Garamond';
}

.close-btn {
  margin-top:20px;
  cursor:pointer;
}

/* ===== CONTACT ===== */
.contact {
  text-align:center;
  padding:40px 20px;
}

/* ===== MOBILE ===== */
@media(max-width:768px){
  .hero h1 { font-size:2.2rem; }
}
</style>
</head>

<body>

<div class="slideshow-container">
  <div class="slide"></div>
  <div class="slide"></div>
  <div class="slide"></div>
  <div class="slide"></div>
</div>

<div class="dark-overlay"></div>

<header>
  <div class="nav-content">
    <div class="logo">RESTAURANT <span>NAME</span></div>
    <nav>
      <a href="#home">HOME</a>
      <a href="#menu">MENU</a>
      <a href="#contact">CONTACT</a>
    </nav>
  </div>
</header>

<section class="hero" id="home">
  <h1>Restaurant Name</h1>
  <div class="divider"></div>
</section>

<div class="content-wrapper">

<section id="menu">
  <div class="section-title"><h2>The Menu</h2></div>

  <div class="menu-section">

    <div class="category-label">Breads & Starters</div>
    <div class="menu-item" onclick="openModal('Tandoori Roti','Clay oven baked bread.')">
      <h3>Tandoori Roti</h3><span>₹40</span>
    </div>
    <div class="menu-item" onclick="openModal('Garlic Naan','Soft naan with butter.')">
      <h3>Garlic Naan</h3><span>₹80</span>
    </div>

    <div class="category-label">Main Course</div>
    <div class="menu-item" onclick="openModal('Dal Makhni','Creamy slow cooked lentils.')">
      <h3>Dal Makhni</h3><span>₹220</span>
    </div>
    <div class="menu-item" onclick="openModal('Paneer Special','Rich paneer gravy.')">
      <h3>Paneer Special</h3><span>₹260</span>
    </div>

    <div class="category-label">Desserts</div>
    <div class="menu-item" onclick="openModal('Gulab Jamun','Sweet syrup dessert.')">
      <h3>Gulab Jamun</h3><span>₹90</span>
    </div>

  </div>
</section>

<section id="contact" class="contact">
  <div class="divider"></div>
  <p>📍 Add your location here</p>
  <p>📞 +91 00000 00000</p>
</section>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3 id="modal-title"></h3>
    <p id="modal-desc"></p>
    <div class="close-btn" onclick="closeModal()">CLOSE</div>
  </div>
</div>

<script>
function openModal(title, desc){
  document.getElementById("modal-title").innerText = title;
  document.getElementById("modal-desc").innerText = desc;
  document.getElementById("modal").classList.add("active");
}

function closeModal(){
  document.getElementById("modal").classList.remove("active");
}
</script>

</body>
</html>
