<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurant Name</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

<style>
:root {
  --gold:#d4af37;
  --dark:#121212;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Montserrat',sans-serif;
  color:white;
  background:black;
}

/* ===== BACKGROUND ===== */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background-size:cover;
  background-position:center;
  z-index:-2;
}

.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.65);
  z-index:-1;
}

/* ===== NAV ===== */
header{
  position:fixed;
  width:100%;
  background:rgba(0,0,0,0.7);
  z-index:1000;
}

.nav-content{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
}

.logo{
  font-family:'Cormorant Garamond';
  font-size:1.4rem;
}
.logo span{color:var(--gold);}

/* NAV LINKS */
nav{
  display:flex;
}

nav a{
  margin-left:20px;
  text-decoration:none;
  color:white;
  font-size:0.7rem;
}

/* HAMBURGER */
.hamburger{
  display:none;
  font-size:1.5rem;
  cursor:pointer;
}

/* MOBILE NAV */
@media(max-width:768px){
  nav{
    position:absolute;
    top:60px;
    right:0;
    background:#111;
    flex-direction:column;
    width:200px;
    text-align:center;
    transform:translateX(100%);
    transition:0.3s;
  }

  nav.active{
    transform:translateX(0);
  }

  nav a{
    padding:15px;
    border-bottom:1px solid rgba(255,255,255,0.1);
  }

  .hamburger{
    display:block;
  }
}

/* ===== HERO ===== */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
  padding:0 20px;
}

.hero h1{
  font-family:'Cormorant Garamond';
  font-size:3rem;
}

.tagline{
  color:var(--gold);
  font-size:0.7rem;
  letter-spacing:3px;
  margin-top:5px;
}

.divider{
  width:50px;
  height:1px;
  background:var(--gold);
  margin:15px auto;
}

/* ===== CONTENT ===== */
.content-wrapper{
  max-width:1100px;
  margin:auto;
  padding:60px 20px;
  background:rgba(18,18,18,0.95);
}

.section-title h2{
  text-align:center;
  font-family:'Cormorant Garamond';
  font-size:2rem;
}

/* MENU */
.menu-item{
  display:flex;
  justify-content:space-between;
  padding:15px 0;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

/* REVIEWS */
.review{
  border:1px solid rgba(255,255,255,0.1);
  padding:15px;
  margin-top:15px;
}

/* CONTACT */
.contact-box{
  border:1px solid rgba(255,255,255,0.1);
  padding:20px;
  margin-top:20px;
  text-align:center;
}
</style>
</head>

<body>

<div class="bg" id="bg"></div>
<div class="overlay"></div>

<header>
  <div class="nav-content">
    <div class="logo">RESTO <span>NAME</span></div>

    <nav id="nav">
      <a href="#menu">MENU</a>
      <a href="#reviews">REVIEWS</a>
      <a href="#contact">CONTACT</a>
    </nav>

    <div class="hamburger" onclick="toggleMenu()">☰</div>
  </div>
</header>

<section class="hero">
  <h1>Restaurant Name</h1>
  <p class="tagline">a prototype by synthree labs</p>
  <div class="divider"></div>
</section>

<div class="content-wrapper">

<section id="menu">
<div class="section-title"><h2>Menu</h2></div>

<div class="menu-item"><span>Paneer Tikka</span><span>₹220</span></div>
<div class="menu-item"><span>Veg Biryani</span><span>₹260</span></div>
<div class="menu-item"><span>Dal Makhni</span><span>₹240</span></div>

</section>

<section id="reviews">
<div class="section-title"><h2>Reviews</h2></div>

<div class="review">"Amazing food experience!"</div>
<div class="review">"Loved the ambience!"</div>

</section>

<section id="contact">
<div class="section-title"><h2>Find Us Here</h2></div>

<div class="contact-box">
📍 Your Address<br>
📞 +91 00000 00000
</div>

</section>

</div>

<script>
/* hamburger */
function toggleMenu(){
  document.getElementById("nav").classList.toggle("active");
}

/* background */
const images=[
'https://images.unsplash.com/photo-1504674900247-0877df9cc836',
'https://images.unsplash.com/photo-1555396273-367ea4eb4db5'
];
document.getElementById("bg").style.backgroundImage=
`url(${images[Math.floor(Math.random()*images.length)]})`;
</script>

</body>
</html>
